services:

  api:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
    - ./app/uploads:/app/uploads
    - ./app/processed:/app/processed

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  worker:
    build: .

    command: celery -A app.workers.celery_worker.celery_app worker --loglevel=info

    env_file:
      - .env

    volumes:
    - ./app/uploads:/app/uploads
    - ./app/processed:/app/processed

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started